services:
  postgres:
    image: postgres:16-alpine
    container_name: desafioavmb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafioavmb_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_prisma_client:/app/node_modules/.prisma
      - ./storage:/app/storage
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafioavmb_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: desafioavmb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_node_modules:
  backend_prisma_client:
  frontend_node_modules:
